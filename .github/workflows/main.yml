name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        uses: ArtemSerebriakov/buildozer-action@v1.6.1
        with:
          command: buildozer android debug
          buildozer_version: master
